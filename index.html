              <div style={{fontSize:48,animation:"sprout .6s ease both",flexShrink:0,lineHeight:1}}>{growth.icon}</div>
            )}
            <div>
              <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:2}}>{growth.label}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",marginBottom:6}}>{growth.desc}</div>
              {/* Growth progress bar — based on streak */}
              <div style={{display:"flex",gap:4,alignItems:"flex-end"}}>
                {[
                  {svg:true,n:1},
                  {icon:"🌱",n:3},
                  {icon:"🌿",n:7},
                  {icon:"🌳",n:30}
                ].map((s,i)=>{
                  const reached=streakCount>=s.n;
                  return(
                    <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      {s.svg?(
                        <svg width="20" height="20" viewBox="0 0 100 100" style={{opacity:reached?1:.25,transition:"opacity .3s"}}>
                          <ellipse cx="50" cy="84" rx="28" ry="5" fill="#c8a882" opacity=".5"/>
                          <ellipse cx="50" cy="66" rx="13" ry="17" fill="#8B6914"/>
                          <ellipse cx="45" cy="58" rx="3.5" ry="5" fill="#a07c20" opacity=".5"/>
                          <path d="M50 51 Q44 59 44 68 Q44 77 50 81" stroke="#6b4f0f" strokeWidth="1.5" fill="none" opacity=".6"/>
                          <line x1="22" y1="79" x2="78" y2="79" stroke="#c8a882" strokeWidth="1" opacity=".4"/>
                        </svg>
                      ):(
                        <span style={{fontSize:16,opacity:reached?1:.25,transition:"opacity .3s"}}>{s.icon}</span>
                      )}
                      <div style={{width:28,height:3,borderRadius:2,background:reached?"var(--accent)":"var(--border2)",transition:"background .3s"}}/>
                      <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:reached?"var(--accent)":"var(--muted)"}}>{s.n}d</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {statCard("📝","total entries",totalEntries)}
        {statCard("📅","days journaled",totalDays)}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {statCard("🔥","current streak",streakCount>0?`${streakCount}d`:"—",streakCount>0?"keep going!":"")}
        {statCard("🏆","longest streak",longestStreak>0?`${longestStreak}d`:"—")}
      </div>
      {topMood&&(
        <div className="card" style={{marginBottom:10}}>
          <div className="clbl">Most common mood</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>{topMood.emoji}</span>
            <div>
              <div style={{fontSize:16,fontWeight:500,color:"var(--text)"}}>{topMood.label}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)"}}>your most logged feeling</div>
            </div>
          </div>
        </div>
      )}

      {/* Random past entry */}
      <div className="card" style={{marginBottom:10}}>
        <div className="clbl">✨ Surprise me</div>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:10,lineHeight:1.6}}>Take a trip back to a random past entry.</p>
        <button onClick={showRandom} style={{background:"rgba(122,170,140,.1)",border:"1px solid rgba(122,170,140,.25)",borderRadius:18,padding:"6px 16px",fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(122,170,140,.18)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(122,170,140,.1)"}>
          🎲 show me a past entry
        </button>
        {randomD&&re&&(
          <div onClick={()=>onPick(randomD)} style={{marginTop:12,padding:"11px 13px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(122,170,140,.3)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#7aaa8c",marginBottom:4}}>{dayLabel(randomD)} · {randomD}</div>
            {re.title?.trim()&&<div style={{fontSize:13,fontWeight:500,color:"var(--text)",marginBottom:3}}>{re.title}</div>}
            {re.journal?.trim()&&<p style={{fontSize:12,color:"var(--muted)",fontStyle:"italic",lineHeight:1.6,margin:0}}>{re.journal.slice(0,120)}…</p>}
          </div>
        )}
      </div>

      {/* Danger Zone — Delete Account */}
      <div className="card" style={{marginBottom:10,border:"1px solid rgba(220,80,80,.18)",background:"rgba(220,80,80,.03)"}}>
        <div className="clbl" style={{color:"rgba(200,70,70,.7)"}}>Danger zone</div>
        <p style={{fontSize:13,color:"var(--text2)",marginBottom:12,lineHeight:1.6}}>Permanently delete your account and all journal entries. This cannot be undone.</p>
        <DeleteAccountButton user={user} signOut={signOut}/>
      </div>

      {/* Privacy Policy link */}
      <div style={{textAlign:"center",marginTop:8,paddingTop:16,borderTop:"1px solid var(--border)"}}>
        <button onClick={onPrivacy} style={{background:"none",border:"none",fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",cursor:"pointer",letterSpacing:".07em",transition:"color .2s"}} onMouseEnter={e=>e.target.style.color="var(--accent)"} onMouseLeave={e=>e.target.style.color="var(--muted)"}>
          Privacy Policy
        </button>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted2)",margin:"0 8px"}}>·</span>
        <span style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted2)"}}>Seeds v1.0 🌱</span>
      </div>

    </div>
  );
}

// ── Delete Account Button ─────────────────────────────────────────────────────
function DeleteAccountButton({user,signOut}){
  const[step,setStep]=useState(0); // 0=idle 1=confirm 2=deleting
  const[error,setError]=useState("");

  const deleteAccount=async()=>{
    if(!user)return;
    setStep(2);
    setError("");
    try{
      // Delete all entries
      await supa.from("entries").delete().eq("user_id",user.id);
      // Delete all manifest
      await supa.from("manifest").delete().eq("user_id",user.id);
      // Delete the user account
      const{error:err}=await supa.rpc("delete_user");
      if(err){
        // If RPC not available, just sign out and inform
        await signOut();
        return;
      }
      await signOut();
    }catch(e){
      // Data deleted, sign out anyway
      try{await signOut();}catch{}
    }
  };

  if(step===0)return(
    <button onClick={()=>setStep(1)} style={{background:"none",border:"1px solid rgba(220,80,80,.3)",borderRadius:18,padding:"7px 16px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"rgba(200,70,70,.8)",cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(220,80,80,.06)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>
      Delete my account
    </button>
  );

  if(step===1)return(
    <div style={{background:"rgba(220,80,80,.06)",border:"1px solid rgba(220,80,80,.2)",borderRadius:12,padding:"14px"}}>
      <div style={{fontSize:13,fontWeight:600,color:"rgba(200,70,70,.9)",marginBottom:6}}>Are you absolutely sure?</div>
      <div style={{fontSize:12,color:"var(--text2)",marginBottom:14,lineHeight:1.6}}>This will permanently delete all your journal entries, gratitudes, tasks, mood logs and your account. There is no way to recover this data.</div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setStep(0)} style={{flex:1,background:"var(--bg2)",border:"1px solid var(--border2)",borderRadius:18,padding:"8px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",cursor:"pointer"}}>
          Cancel
        </button>
        <button onClick={deleteAccount} style={{flex:1,background:"rgba(220,80,80,.9)",border:"none",borderRadius:18,padding:"8px",fontFamily:"'DM Mono',monospace",fontSize:10,color:"#fff",cursor:"pointer",fontWeight:600}}>
          Yes, delete everything
        </button>
      </div>
      {error&&<div style={{fontSize:11,color:"rgba(200,70,70,.8)",marginTop:8}}>{error}</div>}
    </div>
  );

  return(
    <div style={{display:"flex",alignItems:"center",gap:8,color:"var(--muted)",fontFamily:"'DM Mono',monospace",fontSize:11}}>
      <div className="spinner"/>
      Deleting your account…
    </div>
  );
}

// ── Search ────────────────────────────────────────────────────────────────────
function SearchView({q,setQ,res,onPick}){
  return(
    <div className="view">
      <div style={{marginBottom:12}}><div className="ptitle">Search</div><div className="psub">Look back through your days</div></div>
      <input className="sinp" placeholder="Search entries and gratitudes…" value={q} onChange={e=>setQ(e.target.value)}/>
      {q.length>1&&res.length===0&&<div className="empty"><p>Nothing found for "{q}"</p></div>}
      {res.map(([d,e])=>(
        <div key={d} className="ecard" onClick={()=>onPick(d)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:e.title?.trim()?3:7}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",letterSpacing:".06em"}}>{dayLabel(d)}</span>
            {e.mood!=null&&<span style={{fontSize:13}}>{MOODS[e.mood].emoji}</span>}
          </div>
          {e.title?.trim()&&<div style={{fontSize:14,fontWeight:500,color:"var(--text)",marginBottom:3}}>{e.title}</div>}
          {e.journal?.trim()&&<p style={{color:"var(--text3)",fontSize:13,lineHeight:1.65,fontStyle:"italic",marginBottom:5}}>{e.journal.slice(0,120)}…</p>}
          {e.gratitudes?.filter(Boolean).map((g,i)=><div key={i} style={{color:"#7aaa8c",fontSize:12,fontStyle:"italic",marginTop:2}}>✦ {g}</div>)}
        </div>
      ))}
    </div>
  );
}
