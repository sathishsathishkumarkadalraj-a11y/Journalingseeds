<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seeds — Your Gentle Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100%;width:100%;}
body{background:#faf8f4;font-family:'Manrope',sans-serif;color:#2a2a2a;font-size:15px;line-height:1.6;}
::selection{background:rgba(122,170,140,.22);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#e8e0d4;border-radius:4px;}

@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(26px,16px) scale(1.05);}}
@keyframes seedglow{0%,100%{text-shadow:0 0 20px rgba(122,170,140,.35);}50%{text-shadow:0 0 48px rgba(122,170,140,.6);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes load{from{width:0;}to{width:100%;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);};}
@keyframes sprout{0%{transform:scale(0.6) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0deg);opacity:1;}}

.blob{position:absolute;border-radius:50%;filter:blur(65px);opacity:.5;pointer-events:none;}
.blob1{width:560px;height:560px;background:radial-gradient(circle,rgba(255,215,180,.62),transparent 68%);top:-140px;left:-120px;animation:drift 22s ease-in-out infinite alternate;}
.blob2{width:430px;height:430px;background:radial-gradient(circle,rgba(190,238,208,.56),transparent 68%);top:25%;right:-95px;animation:drift 17s ease-in-out infinite alternate;animation-delay:3s;}
.blob3{width:390px;height:390px;background:radial-gradient(circle,rgba(218,208,255,.48),transparent 68%);bottom:-75px;left:24%;animation:drift 25s ease-in-out infinite alternate;animation-delay:8s;}

/* Auth screen */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#faf8f4;position:relative;overflow:hidden;padding:20px;}
.auth-card{position:relative;z-index:1;background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.07);border-radius:22px;padding:36px 30px;width:100%;max-width:360px;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.08);animation:fadeUp .5s ease both;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-glyph{font-size:40px;display:block;animation:sprout .6s ease both,seedglow 3s 1s ease-in-out infinite;}
.auth-name{font-family:'Manrope',sans-serif;font-size:24px;font-weight:600;color:#2a2a2a;letter-spacing:.08em;margin-top:6px;}
.auth-tagline{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;letter-spacing:.12em;margin-top:3px;}
.auth-title{font-size:16px;font-weight:600;color:#2a2a2a;margin-bottom:18px;text-align:center;}
.auth-inp{width:100%;background:rgba(0,0,0,.03);border:1px solid rgba(0,0,0,.1);border-radius:11px;padding:11px 14px;font-family:'Manrope',sans-serif;font-size:14px;color:#2a2a2a;outline:none;transition:border-color .2s;margin-bottom:10px;}
.auth-inp:focus{border-color:rgba(122,170,140,.5);background:rgba(122,170,140,.03);}
.auth-inp::placeholder{color:#ccc;}
.auth-btn{width:100%;background:linear-gradient(135deg,#7aaa8c,#5d9070);border:none;border-radius:11px;padding:12px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;margin-top:4px;letter-spacing:.02em;}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(122,170,140,.35);}
.auth-btn:disabled{opacity:.6;cursor:default;transform:none;}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:#bbb;}
.auth-switch span{color:#7aaa8c;cursor:pointer;font-weight:500;}
.auth-switch span:hover{text-decoration:underline;}
.auth-err{background:rgba(220,100,100,.08);border:1px solid rgba(220,100,100,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:#c06060;margin-bottom:10px;line-height:1.5;}
.auth-ok{background:rgba(122,170,140,.08);border:1px solid rgba(122,170,140,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:#5a9070;margin-bottom:10px;line-height:1.5;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:14px 0;color:#ddd;font-size:12px;}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:#eee;}

/* Header */
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:rgba(250,248,244,.93);backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,.055);flex-wrap:wrap;gap:6px;}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.lmark{font-size:18px;color:#7aaa8c;animation:seedglow 4s ease-in-out infinite;display:inline-block;}
.lname{font-family:'Manrope',sans-serif;font-size:17px;font-weight:600;letter-spacing:.08em;color:#2a2a2a;}
.stag{font-family:'DM Mono',monospace;font-size:9px;color:#7aaa8c;letter-spacing:.08em;animation:fadeIn .3s ease;}
.nav{display:flex;gap:1px;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
.nb{background:none;border:none;cursor:pointer;padding:5px 9px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.07em;color:#bbb;transition:all .2s;border-radius:16px;}
.nb:hover{color:#7aaa8c;background:rgba(122,170,140,.07);}
.na{color:#7aaa8c!important;background:rgba(122,170,140,.1)!important;}
.lock-btn{background:none;border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:4px 9px;font-family:'DM Mono',monospace;font-size:9.5px;color:#bbb;cursor:pointer;transition:all .2s;}
.lock-btn:hover{border-color:rgba(122,170,140,.4);color:#7aaa8c;}

/* Main */
.main{position:relative;z-index:1;max-width:640px;width:100%;margin:0 auto;padding:18px 16px 80px;}
.view{display:flex;flex-direction:column;animation:fadeUp .35s ease both;}

/* Cards */
.card{background:rgba(255,255,255,.78);border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:15px 17px;margin-bottom:10px;backdrop-filter:blur(8px);transition:box-shadow .25s;}
.card:hover{box-shadow:0 4px 18px rgba(0,0,0,.06);}
.clbl{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:#c0c0c0;margin-bottom:11px;}

/* Arrows */
.arw{background:none;border:1px solid rgba(0,0,0,.1);color:#bbb;font-size:17px;border-radius:9px;padding:5px 13px;cursor:pointer;transition:all .2s;font-family:'Manrope',sans-serif;line-height:1;}
.arw:hover:not(:disabled){border-color:rgba(122,170,140,.4);color:#7aaa8c;}
.arw:disabled{opacity:.15;cursor:default;}

/* Page */
.page{background:rgba(255,255,255,.86);border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:20px 22px;backdrop-filter:blur(10px);box-shadow:0 2px 18px rgba(0,0,0,.04);}
.page-title{width:100%;background:none;border:none;outline:none;font-family:'Manrope',sans-serif;font-size:19px;font-weight:600;color:#1a1a1a;letter-spacing:-.02em;margin-bottom:8px;display:block;padding:0;line-height:1.3;}
.page-title::placeholder{color:#ddd;font-weight:300;}
.page-body{width:100%;background:none;border:none;outline:none;font-family:'Manrope',sans-serif;font-size:14.5px;color:#2a2a2a;line-height:1.8;resize:none;display:block;padding:0;min-height:200px;max-height:400px;overflow-y:auto;}
.page-body::placeholder{color:#ccc;font-style:italic;}
.s-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#ccc;}
.gbox-inline{background:none;border:none;border-bottom:1px solid rgba(122,170,140,.18);padding:5px 2px;width:100%;color:#2a2a2a;font-size:14px;resize:none;font-family:'Manrope',sans-serif;line-height:1.55;transition:border-color .2s;overflow:hidden;min-height:30px;outline:none;}
.gbox-inline:focus{border-bottom-color:rgba(122,170,140,.45);}
.gbox-inline::placeholder{color:#ddd;}

/* Read */
.read-page{background:rgba(255,255,255,.86);border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:20px 22px;backdrop-filter:blur(10px);box-shadow:0 2px 18px rgba(0,0,0,.04);}
.read-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:600;color:#1a1a1a;letter-spacing:-.02em;margin-bottom:10px;line-height:1.3;}
.read-body{font-family:'Manrope',sans-serif;font-size:14.5px;color:#3a3a3a;line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.read-edit-btn{background:none;border:1px solid rgba(0,0,0,.1);border-radius:16px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:9.5px;color:#bbb;cursor:pointer;transition:all .2s;}
.read-edit-btn:hover{border-color:rgba(122,170,140,.4);color:#7aaa8c;}
.done-page{background:rgba(255,255,255,.86);border:1px solid rgba(0,0,0,.06);border-radius:16px;padding:40px 22px;backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;}

/* Tasks */
.ainp{flex:1;background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:9px 13px;color:#2a2a2a;font-size:14px;font-family:'Manrope',sans-serif;transition:border-color .2s;}
.ainp:focus{outline:none;border-color:rgba(122,170,140,.5);}
.ainp::placeholder{color:#ccc;}
.addbtn{background:rgba(122,170,140,.13);border:1px solid rgba(122,170,140,.28);color:#7aaa8c;border-radius:10px;width:40px;font-size:20px;cursor:pointer;transition:all .2s;line-height:1;}
.addbtn:hover{background:rgba(122,170,140,.22);transform:scale(1.05);}
.trow{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.055);border-radius:10px;margin-bottom:6px;transition:all .2s;}
.trow:hover{border-color:rgba(0,0,0,.1);}
.ttxt{flex:1;font-size:14px;color:#2a2a2a;font-family:'Manrope',sans-serif;line-height:1.45;}
.mark-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:1px 2px;line-height:1;border-radius:5px;transition:all .15s;flex-shrink:0;}
.mark-btn:hover{background:rgba(0,0,0,.05);transform:scale(1.15);}

/* Entry cards */
.ecard{background:rgba(255,255,255,.78);border:1px solid rgba(0,0,0,.06);border-radius:13px;padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:all .22s;}
.ecard:hover{border-color:rgba(122,170,140,.28);box-shadow:0 4px 16px rgba(0,0,0,.07);transform:translateY(-1px);}
.gchip{background:rgba(122,170,140,.08);border:1px solid rgba(122,170,140,.2);border-radius:7px;padding:3px 9px;font-size:12px;color:#7aaa8c;font-style:italic;}

/* Week cells */
.wcell{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px;border-radius:9px;background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.05);transition:all .2s;}
.wcell.clickable:hover{border-color:rgba(122,170,140,.22);cursor:pointer;}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.calhd{font-family:'DM Mono',monospace;font-size:9px;color:#ccc;text-align:center;padding-bottom:5px;letter-spacing:.06em;}
.calday{aspect-ratio:1;border-radius:7px;background:rgba(0,0,0,.018);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;cursor:default;}
.calhas{background:rgba(122,170,140,.09)!important;border-color:rgba(122,170,140,.2)!important;cursor:pointer;}
.calhas:hover{transform:scale(1.07);}
.caltoday{border-color:#7aaa8c!important;box-shadow:0 0 8px rgba(122,170,140,.22);}
.caln{font-family:'DM Mono',monospace;font-size:10px;color:#bbb;}
.calhas .caln{color:#7aaa8c;}

/* Manifest */
.man-inp{width:100%;background:rgba(212,149,106,.04);border:1px solid rgba(212,149,106,.15);border-radius:10px;padding:9px 13px;color:#2a2a2a;font-size:14px;font-family:'Manrope',sans-serif;transition:border-color .2s;resize:none;overflow:hidden;min-height:38px;outline:none;}
.man-inp:focus{border-color:rgba(212,149,106,.4);}
.man-inp::placeholder{color:#ddd;}
.man-row{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;background:rgba(255,255,255,.8);border:1px solid rgba(0,0,0,.055);border-radius:10px;margin-bottom:6px;transition:all .2s;}
.man-row.achieved{background:rgba(122,170,140,.06);border-color:rgba(122,170,140,.2);}
.man-txt{flex:1;font-size:14px;font-family:'Manrope',sans-serif;color:#2a2a2a;line-height:1.5;}
.man-date{font-family:'DM Mono',monospace;font-size:9px;color:#bbb;margin-top:2px;}

/* Search */
.sinp{background:rgba(255,255,255,.88);border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:10px 13px;width:100%;color:#2a2a2a;font-size:14px;font-family:'Manrope',sans-serif;margin-bottom:14px;transition:border-color .2s;}
.sinp:focus{outline:none;border-color:rgba(0,0,0,.2);}
.sinp::placeholder{color:#ccc;}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(122,170,140,.3);border-top-color:#7aaa8c;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

.empty{text-align:center;padding:40px 20px;color:#ccc;line-height:2.1;font-size:14px;}
.ptitle{font-size:21px;font-weight:600;letter-spacing:-.02em;color:#2a2a2a;}
.psub{font-family:'DM Mono',monospace;font-size:9.5px;color:#bbb;margin-top:3px;letter-spacing:.07em;}

/* Splash */
.splash{min-height:100vh;background:#faf8f4;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.splash-body{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 28px;animation:fadeUp .9s ease both;}
.splash-glyph{font-size:48px;animation:sprout .8s ease both,seedglow 3s 1s ease-in-out infinite;display:block;margin-bottom:4px;}
.splash-title{font-family:'Manrope',sans-serif;font-size:42px;font-weight:300;letter-spacing:.1em;color:#2a2a2a;}
.splash-meaning{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:#ccc;text-transform:uppercase;}
.splash-about{font-family:'Manrope',sans-serif;font-size:14px;line-height:1.9;color:#aaa;max-width:280px;margin-top:4px;}
.splash-bar{width:110px;height:2px;background:#ede8e0;border-radius:2px;overflow:hidden;margin-top:10px;}
.splash-fill{height:100%;background:linear-gradient(90deg,#7aaa8c,#b08ac8,#d4956a);border-radius:2px;animation:load 3.2s ease forwards;}

@media(max-width:600px){.hdr{padding:10px 12px;}.nb{padding:4px 7px;font-size:9px;}.main{padding:14px 12px 80px;}.card{padding:12px 14px;}.auth-card{padding:28px 20px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL = "https://ouylavxahevdhdzwxnto.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91eWxhdnhhaGV2ZGhkend4bnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTcyNDMsImV4cCI6MjA4OTQ5MzI0M30.V8z3LNwaSwLaB7hOsdgENJ8Caiuywotp6MUlkwbCWOs";
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Date helpers ──────────────────────────────────────────────────────────────
const fmtD=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${day}`;};
const todayStr=fmtD(new Date());
const shiftDate=(s,n)=>{const[y,m,d]=s.split("-").map(Number),nd=new Date(y,m-1,d+n);return fmtD(nd);};
const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dayLabel=s=>{if(s===todayStr)return"Today";if(s===shiftDate(todayStr,-1))return"Yesterday";return parseD(s).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});};
const getWeekDates=off=>{const t=new Date(),day=t.getDay(),diff=(day===0?-6:1-day)+off*7,mon=new Date(t.getFullYear(),t.getMonth(),t.getDate()+diff);return Array.from({length:7},(_,i)=>shiftDate(fmtD(mon),i));};
const getMonthDates=off=>{const t=new Date(),s=new Date(t.getFullYear(),t.getMonth()+off,1),e=new Date(t.getFullYear(),t.getMonth()+off+1,0);const a=[];for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))a.push(fmtD(new Date(d)));return a;};

const MOODS=[
  {emoji:"🫂",label:"Heavy", bg:"rgba(140,160,200,.13)",ac:"#8ca0c8"},
  {emoji:"⛅",label:"Okay",  bg:"rgba(170,190,210,.13)",ac:"#aabece"},
  {emoji:"🌸",label:"Calm",  bg:"rgba(200,155,175,.13)",ac:"#c89aae"},
  {emoji:"☀️",label:"Good",  bg:"rgba(255,210,120,.13)",ac:"#e8c060"},
  {emoji:"🥂",label:"Joyful",bg:"rgba(160,220,180,.13)",ac:"#7aaa8c"},
];

function Blobs(){return<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}><div className="blob blob1"/><div className="blob blob2"/><div className="blob blob3"/></div>;}

function Splash(){return<div className="splash"><Blobs/><div className="splash-body"><span className="splash-glyph">🌱</span><h1 className="splash-title">seeds</h1><p className="splash-meaning">a journal for what you're growing</p><p className="splash-about">Every thought you write,<br/>every thing you're grateful for,<br/>is a seed planted in your story.</p><div className="splash-bar"><div className="splash-fill"/></div></div></div>;}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const[mode,setMode]=useState("login"); // login | signup | forgot
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[ok,setOk]=useState("");

  const submit=async()=>{
    setErr("");setOk("");
    if(!email.trim()||(!password.trim()&&mode!=="forgot")){setErr("Please fill in all fields.");return;}
    setLoading(true);
    try{
      if(mode==="login"){
        const{error}=await supa.auth.signInWithPassword({email:email.trim(),password});
        if(error)throw error;
      } else if(mode==="signup"){
        if(password.length<6){setErr("Password must be at least 6 characters.");setLoading(false);return;}
        const{error}=await supa.auth.signUp({email:email.trim(),password});
        if(error)throw error;
        setOk("Account created! You can now sign in.");
        setMode("login");setPassword("");
      } else if(mode==="forgot"){
        const{error}=await supa.auth.resetPasswordForEmail(email.trim());
        if(error)throw error;
        setOk("Password reset email sent! Check your inbox.");
        setMode("login");
      }
    }catch(e){
      setErr(e.message||"Something went wrong. Try again.");
    }
    setLoading(false);
  };

  return(
    <div className="auth-wrap"><Blobs/>
      <div className="auth-card">
        <div className="auth-logo">
          <span className="auth-glyph">🌱</span>
          <div className="auth-name">seeds</div>
          <div className="auth-tagline">your gentle journal</div>
        </div>
        <div className="auth-title">
          {mode==="login"?"Welcome back":mode==="signup"?"Create your account":"Reset password"}
        </div>
        {err&&<div className="auth-err">{err}</div>}
        {ok&&<div className="auth-ok">{ok}</div>}
        <input className="auth-inp" type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {mode!=="forgot"&&<input className="auth-inp" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>}
        <button className="auth-btn" onClick={submit} disabled={loading}>
          {loading?<span className="spinner"/>:mode==="login"?"Sign in →":mode==="signup"?"Create account →":"Send reset email →"}
        </button>
        {mode==="login"&&(
          <div className="auth-switch">
            <div style={{marginBottom:6}}>Don't have an account? <span onClick={()=>{setMode("signup");setErr("");setOk("");}}>Sign up</span></div>
            <div><span onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Forgot password?</span></div>
          </div>
        )}
        {mode==="signup"&&<div className="auth-switch">Already have an account? <span onClick={()=>{setMode("login");setErr("");setOk("");}}>Sign in</span></div>}
        {mode==="forgot"&&<div className="auth-switch"><span onClick={()=>{setMode("login");setErr("");setOk("");}}>Back to sign in</span></div>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("splash");
  const[user,setUser]=useState(null);
  const[view,setView]=useState("today");
  const[entries,setEntries]=useState({});
  const[manifest,setManifest]=useState([]);
  const[selDate,setSelDate]=useState(todayStr);
  const[wOff,setWOff]=useState(0);
  const[mOff,setMOff]=useState(0);
  const[searchQ,setSearchQ]=useState("");
  const[saving,setSaving]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    const t=setTimeout(()=>setScreen("auth"),3400);
    supa.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);setScreen("app");}
    });
    const{data:{subscription}}=supa.auth.onAuthStateChange((_,session)=>{
      if(session){setUser(session.user);setScreen("app");}
      else{setUser(null);setScreen("auth");setEntries({});setManifest([]);}
    });
    return()=>{clearTimeout(t);subscription.unsubscribe();};
  },[]);

  // Load all data when user logs in
  useEffect(()=>{
    if(!user)return;
    loadAllData();
  },[user]);

  const loadAllData=async()=>{
    setSyncing(true);
    try{
      // Load entries
      const{data:eData}=await supa.from("entries").select("*").eq("user_id",user.id);
      if(eData){
        const map={};
        eData.forEach(row=>{
          map[row.date]={
            title:row.title||"",
            journal:row.journal||"",
            mood:row.mood,
            gratitudes:row.gratitudes||[],
            todos:row.todos||[],
            createdAt:row.created_at
          };
        });
        setEntries(map);
      }
      // Load manifest
      const{data:mData}=await supa.from("manifest").select("*").eq("user_id",user.id).order("created_at",{ascending:false});
      if(mData)setManifest(mData.map(r=>({id:r.id,text:r.text,date:r.date,achieved:r.achieved,achievedDate:r.achieved_date})));
    }catch(e){console.error("Load error:",e);}
    setSyncing(false);
  };

  const getE=d=>entries[d]||{title:"",journal:"",mood:null,gratitudes:["","",""],todos:[],createdAt:new Date().toISOString()};

  const upd=async(d,patch)=>{
    // Optimistic update
    setEntries(prev=>({...prev,[d]:{...getE(d),...patch}}));
    setSaving(true);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const entry={...getE(d),...patch};
      try{
        await supa.from("entries").upsert({
          user_id:user.id,
          date:d,
          title:entry.title||"",
          journal:entry.journal||"",
          mood:entry.mood,
          gratitudes:entry.gratitudes||[],
          todos:entry.todos||[],
          updated_at:new Date().toISOString()
        },{onConflict:"user_id,date"});
      }catch(e){console.error("Save error:",e);}
      setSaving(false);
    },800);
  };

  const addManifest=async(text)=>{
    const item={id:Date.now().toString(),text,date:todayStr,achieved:false,achievedDate:null};
    setManifest(prev=>[item,...prev]);
    await supa.from("manifest").insert({user_id:user.id,text,date:todayStr,achieved:false});
  };

  const toggleManifest=async(id)=>{
    const item=manifest.find(m=>m.id===id);
    if(!item)return;
    const achieved=!item.achieved;
    const achievedDate=achieved?todayStr:null;
    setManifest(prev=>prev.map(m=>m.id===id?{...m,achieved,achievedDate}:m));
    await supa.from("manifest").update({achieved,achieved_date:achievedDate}).eq("id",id);
  };

  const deleteManifest=async(id)=>{
    setManifest(prev=>prev.filter(m=>m.id!==id));
    await supa.from("manifest").delete().eq("id",id);
  };

  const signOut=async()=>{await supa.auth.signOut();};

  // Streak
  const streak=()=>{let c=0,d=new Date();while(true){const ds=fmtD(d),e=entries[ds];if(!e||(!e.journal?.trim()&&!e.gratitudes?.some(Boolean)))break;c++;d.setDate(d.getDate()-1);}return c;};
  const streakCount=streak();
  const greeting=()=>{const h=new Date().getHours();if(h<12)return"Good morning";if(h<17)return"Good afternoon";if(h<21)return"Good evening";return"Good night";};

  const wDates=getWeekDates(wOff),mDates=getMonthDates(mOff);
  const wEnt=wDates.map(d=>({date:d,e:entries[d]})).filter(x=>x.e);
  const mEnt=mDates.map(d=>({date:d,e:entries[d]})).filter(x=>x.e);
  const searchRes=searchQ.length>1?Object.entries(entries).filter(([,e])=>e.title?.toLowerCase().includes(searchQ.toLowerCase())||e.journal?.toLowerCase().includes(searchQ.toLowerCase())||e.gratitudes?.some(g=>g?.toLowerCase().includes(searchQ.toLowerCase()))).sort(([a],[b])=>b.localeCompare(a)):[];

  if(screen==="splash")return<Splash/>;
  if(screen==="auth"||!user)return<AuthScreen onAuth={()=>setScreen("app")}/>;

  return(
    <div style={{minHeight:"100vh",background:"#faf8f4",color:"#2a2a2a",fontFamily:"'Manrope',sans-serif",display:"flex",flexDirection:"column",position:"relative"}}>
      <Blobs/>
      <header className="hdr">
        <div className="logo" onClick={()=>setView("today")}>
          <span className="lmark">🌱</span><span className="lname">seeds</span>
          {saving&&<span className="stag">saving…</span>}
          {!saving&&syncing&&<span className="stag">syncing…</span>}
          {!saving&&!syncing&&<span className="stag">✓ saved</span>}
        </div>
        <nav className="nav">
          {[["today","Write"],["todos","Tasks"],["entries","Past"],["weekly","Week"],["monthly","Month"],["manifest","Future"],["search","Search"]].map(([v,l])=>(
            <button key={v} className={`nb${view===v?" na":""}`} onClick={()=>setView(v)}>{l}</button>
          ))}
          <button className="lock-btn" onClick={signOut}>Sign out</button>
        </nav>
      </header>
      <main className="main">
        {view==="today"   &&<WriteView   date={selDate} entry={getE(selDate)} upd={p=>upd(selDate,p)} setDate={setSelDate} greeting={greeting()} streak={streakCount}/>}
        {view==="todos"   &&<TodoView    date={selDate} entry={getE(selDate)} upd={p=>upd(selDate,p)}/>}
        {view==="entries" &&<EntriesView entries={entries} onPick={d=>{setSelDate(d);setView("today");}}/>}
        {view==="weekly"  &&<WeeklyView  wDates={wDates} wEnt={wEnt} entries={entries} wOff={wOff} setWOff={setWOff} onPick={d=>{setSelDate(d);setView("today");}}/>}
        {view==="monthly" &&<MonthlyView mDates={mDates} mEnt={mEnt} entries={entries} mOff={mOff} setMOff={setMOff} onPick={d=>{setSelDate(d);setView("today");}}/>}
        {view==="manifest"&&<ManifestView manifest={manifest} addManifest={addManifest} toggleManifest={toggleManifest} deleteManifest={deleteManifest}/>}
        {view==="search"  &&<SearchView  q={searchQ} setQ={setSearchQ} res={searchRes} onPick={d=>{setSelDate(d);setView("today");}}/>}
      </main>
    </div>
  );
}

// ── Write View ────────────────────────────────────────────────────────────────

              </div>

            <button onClick={()=>upd({gratitudes:[...(entry.gratitudes||[]),""]}) } style={{alignSelf:"flex-start",background:"none",border:"none",fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"rgba(122,170,140,.4)",cursor:"pointer",padding:"2px 0",letterSpacing:".05em",transition:"color .2s"}} onMouseEnter={e=>e.currentTarget.style.color="#7aaa8c"} onMouseLeave={e=>e.currentTarget.style.color="rgba(122,170,140,.4)"}>+ add more</button>

// ── Todo View ─────────────────────────────────────────────────────────────────
function TodoView({date,entry,upd}){
  const[text,setText]=useState("");
  const ref=useRef(null);
  const todos=entry.todos||[];
  const add=()=>{const t=text.trim();if(!t)return;upd({todos:[...todos,{id:Date.now(),text:t,status:null}]});setText("");ref.current?.focus();};
  const setStatus=(id,s)=>upd({todos:todos.map(t=>t.id===id?{...t,status:t.status===s?null:s}:t)});
  const remove=id=>upd({todos:todos.filter(t=>t.id!==id)});
  const pending=todos.filter(t=>!t.status),done_=todos.filter(t=>t.status==="done"),fail_=todos.filter(t=>t.status==="fail");
  const TRow=({t})=>(
    <div className="trow" style={{opacity:t.status?.6:1}}>
      <span className="ttxt" style={{textDecoration:t.status?"line-through":"none",color:t.status?"#aaa":"#2a2a2a"}}>{t.text}</span>
      <button className={`mark-btn${t.status==="done"?" active-done":""}`} onClick={()=>setStatus(t.id,"done")}>✅</button>
      <button className={`mark-btn${t.status==="fail"?" active-fail":""}`} onClick={()=>setStatus(t.id,"fail")}>❌</button>
      <button style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#ddd",padding:"0 2px",lineHeight:1,transition:"color .2s"}} onClick={()=>remove(t.id)} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
    </div>
  );
  return(
    <div className="view">
      <div style={{marginBottom:14}}>
        <div className="ptitle">Tasks</div>
        <div className="psub">{dayLabel(date)}</div>
        {todos.length>0&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#aaa",marginTop:4,display:"flex",gap:10}}>
          <span style={{color:"#7aaa8c"}}>✅ {done_.length}</span>
          <span style={{color:"#e08080"}}>❌ {fail_.length}</span>
          {pending.length>0&&<span style={{color:"#bbb"}}>◯ {pending.length}</span>}
        </div>}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14}}>
        <input ref={ref} className="ainp" placeholder="Add a task…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="addbtn" onClick={add}>＋</button>
      </div>
      {pending.length>0&&<div style={{marginBottom:12}}><div className="clbl">Pending</div>{pending.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {done_.length>0&&<div style={{marginBottom:12}}><div className="clbl">Completed ✅</div>{done_.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {fail_.length>0&&<div><div className="clbl">Didn't complete ❌</div>{fail_.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {todos.length===0&&<div className="empty"><div style={{fontSize:26,marginBottom:6}}>🌿</div><p>Nothing here yet.</p></div>}
    </div>
  );
}

// ── Past Entries ──────────────────────────────────────────────────────────────
function EntriesView({entries,onPick}){

      <div style={{marginBottom:14}}><div className="ptitle">Past Entries</div><div className="psub">Tap any to open and edit</div></div>

      {sorted.map(d=>{const e=entries[d],m=e.mood!=null?MOODS[e.mood]:null;const dc=(e.todos||[]).filter(t=>t.status==="done").length,fc=(e.todos||[]).filter(t=>t.status==="fail").length,tc=(e.todos||[]).length;return(
        <div key={d} className="ecard" onClick={()=>onPick(d)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:e.title?.trim()?3:7}}>
            <div><span style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",letterSpacing:".06em"}}>{dayLabel(d)}</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#bbb"}}> · {d}</span></div>
            <div style={{display:"flex",gap:5,alignItems:"center"}}>
              {tc>0&&<span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#aaa"}}>✅{dc} ❌{fc}</span>}
              {m&&<span style={{fontSize:14}}>{m.emoji}</span>}
            </div>
          </div>
          {e.title?.trim()&&<div style={{fontSize:14,fontWeight:500,color:"#2a2a2a",marginBottom:3}}>{e.title}</div>}
          {e.journal?.trim()&&<p style={{color:"#999",fontSize:13,lineHeight:1.6,fontStyle:"italic",marginBottom:6}}>{e.journal.slice(0,110)}{e.journal.length>110?"…":""}</p>}
          {e.gratitudes?.some(Boolean)&&<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{e.gratitudes.filter(Boolean).slice(0,3).map((g,i)=><span key={i} className="gchip">✦ {g.slice(0,34)}</span>)}</div>}
        </div>
      );})}
    </div>
  );
}

// ── Weekly ────────────────────────────────────────────────────────────────────
function WeeklyView({wDates,wEnt,entries,wOff,setWOff,onPick}){
  const s=parseD(wDates[0]),e=parseD(wDates[6]);
  const allG=wEnt.flatMap(({date,e})=>(e.gratitudes||[]).filter(Boolean).map(g=>({date,g})));
  const allT=wEnt.flatMap(({date,e})=>(e.todos||[]).map(t=>({date,...t})));
  return(
    <div className="view">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button className="arw" onClick={()=>setWOff(w=>w-1)}>‹</button>
        <div style={{textAlign:"center"}}><div className="ptitle">This Week</div><div className="psub">{s.toLocaleDateString("en-US",{month:"short",day:"numeric"})} – {e.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div></div>
        <button className="arw" disabled={wOff>=0} onClick={()=>setWOff(w=>w+1)}>›</button>
      </div>
      <div className="card"><div className="clbl">Mood across the week</div>
        <div style={{display:"flex",gap:4}}>{wDates.map(d=>{const en=entries[d],mo=en?.mood!=null?MOODS[en.mood]:null;return(<div key={d} className={`wcell${en?" clickable":""}`} onClick={()=>en&&onPick(d)}><div style={{fontSize:16,opacity:en?1:.15}}>{mo?mo.emoji:"○"}</div><div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:"#bbb",marginTop:2}}>{parseD(d).toLocaleDateString("en-US",{weekday:"short"})}</div></div>);})}</div>
      </div>
      {allT.length>0&&<div className="card"><div className="clbl">Tasks this week — ✅{allT.filter(t=>t.status==="done").length} ❌{allT.filter(t=>t.status==="fail").length} ◯{allT.filter(t=>!t.status).length}</div>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>{allT.map((t,i)=><div key={i} style={{display:"flex",gap:7,alignItems:"center"}}><span style={{fontSize:12}}>{t.status==="done"?"✅":t.status==="fail"?"❌":"○"}</span><span style={{fontSize:13,color:t.status?"#aaa":"#2a2a2a",textDecoration:t.status?"line-through":"none",flex:1}}>{t.text}</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#bbb"}}>{parseD(t.date).toLocaleDateString("en-US",{weekday:"short"})}</span></div>)}</div>
      </div>}
      {allG.length>0&&<div className="card"><div className="clbl">✦ Gratitudes this week</div><div style={{display:"flex",flexDirection:"column",gap:7}}>{allG.map((x,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#bbb",paddingTop:2,minWidth:26}}>{parseD(x.date).toLocaleDateString("en-US",{weekday:"short"})}</span><span style={{color:"#7aaa8c",fontSize:13,fontStyle:"italic",lineHeight:1.6}}>{x.g}</span></div>)}</div></div>}
      {wEnt.filter(x=>x.e.journal?.trim()).length>0&&<div className="card"><div className="clbl">Journal this week</div>{wEnt.filter(x=>x.e.journal?.trim()).map(({date,e})=><div key={date} onClick={()=>onPick(date)} style={{padding:"9px 11px",background:"rgba(0,0,0,.012)",borderRadius:8,marginBottom:6,cursor:"pointer",border:"1px solid transparent",transition:"border-color .2s"}} onMouseEnter={el=>el.currentTarget.style.borderColor="rgba(0,0,0,.08)"} onMouseLeave={el=>el.currentTarget.style.borderColor="transparent"}><div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#bbb",marginBottom:3}}>{dayLabel(date)}</div>{e.title?.trim()&&<div style={{fontSize:13,fontWeight:500,color:"#2a2a2a",marginBottom:2}}>{e.title}</div>}<p style={{margin:0,color:"#999",fontSize:13,lineHeight:1.7,fontStyle:"italic"}}>{e.journal.slice(0,140)}{e.journal.length>140?"…":""}</p></div>)}</div>}
      {wEnt.length===0&&<div className="empty"><div style={{fontSize:24}}>🌱</div><p>No entries this week yet.</p></div>}
    </div>
  );
}

// ── Monthly ───────────────────────────────────────────────────────────────────
function MonthlyView({mDates,mEnt,entries,mOff,setMOff,onPick}){
  const name=parseD(mDates[0]).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  const allG=mEnt.flatMap(({date,e})=>(e.gratitudes||[]).filter(Boolean).map(g=>({date,g})));
  return(
    <div className="view">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
        <button className="arw" onClick={()=>setMOff(m=>m-1)}>‹</button>
        <div style={{textAlign:"center"}}><div className="ptitle">{name}</div><div className="psub">monthly reflection</div></div>
        <button className="arw" disabled={mOff>=0} onClick={()=>setMOff(m=>m+1)}>›</button>
      </div>
      <div className="card"><div className="clbl">Your month at a glance</div>
        <div className="cal">
          {["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=><div key={d} className="calhd">{d}</div>)}
          {Array.from({length:(parseD(mDates[0]).getDay()||7)-1},(_,i)=><div key={"_"+i}/>)}
          {mDates.map(d=>{const e=entries[d],has=e&&(e.journal?.trim()||e.gratitudes?.some(Boolean)||e.todos?.length),m=e?.mood!=null?MOODS[e.mood]:null;return(<div key={d} className={`calday${has?" calhas":""}${d===todayStr?" caltoday":""}`} onClick={()=>has&&onPick(d)} style={has&&m?{background:m.bg,borderColor:m.ac}:{}}><span className="caln">{parseD(d).getDate()}</span>{has&&m&&<span style={{fontSize:7,lineHeight:1}}>{m.emoji}</span>}</div>);})}
        </div>
      </div>
      {allG.length>0&&<div className="card"><div className="clbl">✦ What you were grateful for</div><div style={{display:"flex",flexDirection:"column",gap:7}}>{allG.map((x,i)=><div key={i} style={{display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#bbb",paddingTop:2,minWidth:18}}>{parseD(x.date).getDate()}</span><span style={{color:"#7aaa8c",fontSize:13,fontStyle:"italic",lineHeight:1.6}}>{x.g}</span></div>)}</div></div>}
      {mEnt.length===0&&<div className="empty"><div style={{fontSize:24}}>🌱</div><p>No entries this month yet.</p></div>}
    </div>
  );
}

// ── Manifestation ─────────────────────────────────────────────────────────────
function ManifestView({manifest,addManifest,toggleManifest,deleteManifest}){
  const[text,setText]=useState("");
  const ref=useRef(null);
  const add=()=>{const t=text.trim();if(!t)return;addManifest(t);setText("");ref.current?.focus();};
  const pending=manifest.filter(m=>!m.achieved),achieved=manifest.filter(m=>m.achieved);
  return(
    <div className="view">
      <div style={{marginBottom:14}}><div className="ptitle">Future Self</div><div className="psub">Things you're calling into your life</div></div>
      <div className="card" style={{background:"linear-gradient(135deg,rgba(245,240,255,.97),rgba(255,245,235,.97)",border:"1px solid rgba(212,149,106,.15)"}}>
        <div className="clbl" style={{color:"#d4956a"}}>Plant a seed for the future</div>
        <div style={{display:"flex",gap:7}}>
          <textarea ref={ref} className="man-inp" rows={2} placeholder="Something you want to achieve, become, or experience…" value={text} onChange={e=>setText(e.target.value)}/>
          <button onClick={add} style={{background:"rgba(212,149,106,.13)",border:"1px solid rgba(212,149,106,.28)",color:"#d4956a",borderRadius:10,width:38,fontSize:18,cursor:"pointer",transition:"all .2s",lineHeight:1,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background="rgba(212,149,106,.22)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(212,149,106,.13)"}>＋</button>
        </div>
      </div>
      {manifest.length===0&&<div className="empty"><div style={{fontSize:26,marginBottom:6}}>🌠</div><p>What does your future self look like?<br/>Write it here — then watch it grow.</p></div>}
      {pending.length>0&&<div style={{marginBottom:14}}><div className="clbl">Growing 🌱</div>
        {pending.map(m=><div key={m.id} className="man-row"><div style={{flex:1}}><div className="man-txt">{m.text}</div><div className="man-date">Planted {parseD(m.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div></div>
          <button onClick={()=>toggleManifest(m.id)} style={{background:"none",border:"1px solid rgba(122,170,140,.25)",borderRadius:16,padding:"3px 9px",fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#7aaa8c",cursor:"pointer",transition:"all .2s",marginLeft:5,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background="rgba(122,170,140,.1)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>achieved ✓</button>
          <button onClick={()=>deleteManifest(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#ddd",padding:"0 3px",transition:"color .2s",marginLeft:2}} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
        </div>)}
      </div>}
      {achieved.length>0&&<div><div className="clbl">Manifested ✨</div>
        {achieved.map(m=><div key={m.id} className="man-row achieved"><div style={{flex:1}}><div className="man-txt" style={{color:"#7aaa8c"}}>{m.text}</div><div style={{display:"flex",gap:6,marginTop:2,alignItems:"center",flexWrap:"wrap"}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,background:"rgba(122,170,140,.12)",color:"#7aaa8c",borderRadius:8,padding:"1px 6px"}}>✨ achieved</span>{m.achievedDate&&<span className="man-date">{parseD(m.achievedDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>}</div></div>
          <button onClick={()=>toggleManifest(m.id)} style={{background:"none",border:"none",fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#bbb",cursor:"pointer",padding:"0 5px"}} title="Mark as not yet achieved">undo</button>
          <button onClick={()=>deleteManifest(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#ddd",padding:"0 3px",transition:"color .2s"}} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
        </div>)}
      </div>}
    </div>
  );
}

// ── Search ────────────────────────────────────────────────────────────────────
function SearchView({q,setQ,res,onPick}){
  return(
    <div className="view">
      <div style={{marginBottom:12}}><div className="ptitle">Search</div><div className="psub">Look back through your days</div></div>
      <input className="sinp" placeholder="Search entries and gratitudes…" value={q} onChange={e=>setQ(e.target.value)}/>
      {q.length>1&&res.length===0&&<div className="empty"><p>Nothing found for "{q}"</p></div>}
      {res.map(([d,e])=>(
        <div key={d} className="ecard" onClick={()=>onPick(d)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:e.title?.trim()?3:7}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",letterSpacing:".06em"}}>{dayLabel(d)}</span>
            {e.mood!=null&&<span style={{fontSize:13}}>{MOODS[e.mood].emoji}</span>}
          </div>
          {e.title?.trim()&&<div style={{fontSize:14,fontWeight:500,color:"#2a2a2a",marginBottom:3}}>{e.title}</div>}
          {e.journal?.trim()&&<p style={{color:"#999",fontSize:13,lineHeight:1.65,fontStyle:"italic",marginBottom:5}}>{e.journal.slice(0,120)}…</p>}
          {e.gratitudes?.filter(Boolean).map((g,i)=><div key={i} style={{color:"#7aaa8c",fontSize:12,fontStyle:"italic",marginTop:2}}>✦ {g}</div>)}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
