<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seeds — Your Gentle Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body,#root{min-height:100%;width:100%;}

/* ── Light mode (default) ── */
:root{
  --bg:#f7f4ef;
  --bg2:rgba(255,255,255,.92);
  --bg3:rgba(255,255,255,.97);
  --bg4:rgba(255,255,255,.97);
  --hdr:rgba(247,244,239,.96);
  --border:rgba(0,0,0,.08);
  --border2:rgba(0,0,0,.14);
  --text:#1a1a1a;
  --text2:#444;
  --text3:#777;
  --muted:#999;
  --muted2:#bbb;
  --muted3:#ddd;
  --card-shadow:0 2px 12px rgba(0,0,0,.07),0 8px 28px rgba(0,0,0,.05);
  --input-bg:rgba(0,0,0,.025);
  --blob1:rgba(255,210,165,.7);
  --blob2:rgba(180,232,200,.65);
  --blob3:rgba(210,195,255,.55);
  --accent:#6a9e7e;
  --accent2:#4e8262;
}

/* ── Dark mode ── */
.dark{
  --bg:#111111;
  --bg2:rgba(28,28,28,.97);
  --bg3:rgba(22,22,22,.99);
  --bg4:rgba(30,30,30,.99);
  --hdr:rgba(15,15,15,.97);
  --border:rgba(255,255,255,.08);
  --border2:rgba(255,255,255,.14);
  --text:#f0ece6;
  --text2:#c4bdb4;
  --text3:#8a8278;
  --muted:#5a5450;
  --muted2:#424040;
  --muted3:#2e2c2a;
  --card-shadow:0 4px 24px rgba(0,0,0,.4);
  --input-bg:rgba(255,255,255,.04);
  --blob1:rgba(255,180,100,.07);
  --blob2:rgba(100,180,140,.07);
  --blob3:rgba(160,140,220,.07);
  --accent:#7aaa8c;
  --accent2:#5d9070;
}

body{background:var(--bg);font-family:'Manrope',sans-serif;color:var(--text);font-size:15px;line-height:1.6;transition:background .35s,color .35s;}
::selection{background:rgba(106,158,126,.22);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--muted3);border-radius:4px;}

@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(26px,16px) scale(1.05);}}
@keyframes seedglow{0%,100%{text-shadow:0 0 20px rgba(106,158,126,.35);}50%{text-shadow:0 0 48px rgba(106,158,126,.6);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes load{from{width:0;}to{width:100%;}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);};}
@keyframes sprout{0%{transform:scale(0.6) rotate(-10deg);opacity:0;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes tabIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes cardIn{0%{opacity:0;transform:scale(.94) translateY(8px);}60%{transform:scale(1.02);}100%{opacity:1;transform:scale(1) translateY(0);}}
@keyframes bounce{0%,100%{transform:scale(1);}40%{transform:scale(1.18);}70%{transform:scale(.94);}}
@keyframes streakPop{0%{transform:scale(.8);opacity:0;}60%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}
@keyframes glow{0%,100%{box-shadow:0 0 0 rgba(106,158,126,0);}50%{box-shadow:0 0 18px rgba(106,158,126,.3);}}
@keyframes skeletonShimmer{0%{background-position:-400px 0;}100%{background-position:400px 0;}}

.blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;pointer-events:none;}
.blob1{width:560px;height:560px;background:radial-gradient(circle,var(--blob1),transparent 68%);top:-140px;left:-120px;animation:drift 22s ease-in-out infinite alternate;}
.blob2{width:430px;height:430px;background:radial-gradient(circle,var(--blob2),transparent 68%);top:25%;right:-95px;animation:drift 17s ease-in-out infinite alternate;animation-delay:3s;}
.blob3{width:390px;height:390px;background:radial-gradient(circle,var(--blob3),transparent 68%);bottom:-75px;left:24%;animation:drift 25s ease-in-out infinite alternate;animation-delay:8s;}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:20px;}
.auth-card{position:relative;z-index:1;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:36px 30px;width:100%;max-width:360px;backdrop-filter:blur(12px);box-shadow:0 8px 40px rgba(0,0,0,.12);animation:fadeUp .5s ease both;}
.auth-logo{text-align:center;margin-bottom:24px;}
.auth-glyph{font-size:40px;display:block;animation:sprout .6s ease both,seedglow 3s 1s ease-in-out infinite;}
.auth-name{font-family:'Manrope',sans-serif;font-size:24px;font-weight:600;color:var(--text);letter-spacing:.08em;margin-top:6px;}
.auth-tagline{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;margin-top:3px;}
.auth-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:18px;text-align:center;}
.auth-inp{width:100%;background:var(--input-bg);border:1px solid var(--border2);border-radius:11px;padding:11px 14px;font-family:'Manrope',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s;margin-bottom:10px;}
.auth-inp:focus{border-color:rgba(122,170,140,.5);background:rgba(122,170,140,.05);}
.auth-inp::placeholder{color:var(--muted);}
.auth-btn{width:100%;background:linear-gradient(135deg,#7aaa8c,#5d9070);border:none;border-radius:11px;padding:12px;font-family:'Manrope',sans-serif;font-size:14px;font-weight:600;color:#fff;cursor:pointer;transition:all .2s;margin-top:4px;letter-spacing:.02em;}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(122,170,140,.35);}
.auth-btn:disabled{opacity:.6;cursor:default;transform:none;}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
.auth-switch span{color:var(--accent);cursor:pointer;font-weight:500;}
.auth-err{background:rgba(220,100,100,.08);border:1px solid rgba(220,100,100,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:#c06060;margin-bottom:10px;line-height:1.5;}
.auth-ok{background:rgba(122,170,140,.08);border:1px solid rgba(122,170,140,.2);border-radius:9px;padding:9px 12px;font-size:12px;color:#5a9070;margin-bottom:10px;line-height:1.5;}

/* Header */
.hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--hdr);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:6px;transition:background .3s;}
.logo{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.lmark{font-size:18px;color:var(--accent);animation:seedglow 4s ease-in-out infinite;display:inline-block;}
.lname{font-family:'Manrope',sans-serif;font-size:17px;font-weight:600;letter-spacing:.08em;color:var(--text);}
.stag{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);letter-spacing:.08em;animation:fadeIn .3s ease;}
.nav{display:flex;gap:1px;flex-wrap:wrap;justify-content:flex-end;align-items:center;}
.nb{background:none;border:none;cursor:pointer;padding:5px 9px;font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.07em;color:var(--muted);transition:all .2s;border-radius:16px;}
.nb:hover{color:var(--accent);background:rgba(122,170,140,.07);}
.na{color:var(--accent)!important;background:rgba(122,170,140,.1)!important;}
.lock-btn{background:none;border:1px solid var(--border);border-radius:16px;padding:4px 9px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);cursor:pointer;transition:all .2s;}
.lock-btn:hover{border-color:rgba(122,170,140,.4);color:var(--accent);}

/* Theme toggle button */
.theme-btn{background:none;border:1px solid var(--border);border-radius:16px;padding:4px 9px;font-size:13px;cursor:pointer;transition:all .2s;line-height:1;}
.theme-btn:hover{border-color:rgba(122,170,140,.4);}

/* Main */
.main{position:relative;z-index:1;max-width:640px;width:100%;margin:0 auto;padding:18px 16px 80px;}
.view{display:flex;flex-direction:column;animation:tabIn .28s ease both;}

/* Cards — deeper shadow for light mode depth */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 17px;margin-bottom:10px;backdrop-filter:blur(8px);box-shadow:var(--card-shadow);transition:box-shadow .25s,background .3s,transform .15s;}
.card:hover{box-shadow:0 4px 24px rgba(0,0,0,.1),0 1px 4px rgba(0,0,0,.06);transform:translateY(-1px);}
.clbl{font-family:'DM Mono',monospace;font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:11px;}

/* Arrows */
.arw{background:var(--bg2);border:1px solid var(--border2);color:var(--muted);font-size:17px;border-radius:9px;padding:5px 13px;cursor:pointer;transition:all .18s;font-family:'Manrope',sans-serif;line-height:1;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.arw:hover:not(:disabled){border-color:rgba(106,158,126,.5);color:var(--accent);background:rgba(106,158,126,.06);}
.arw:active:not(:disabled){transform:scale(.94);}
.arw:disabled{opacity:.15;cursor:default;}

/* Page — writing area is the hero */
.page{background:var(--bg3);border:1px solid var(--border);border-radius:18px;padding:22px 22px 20px;backdrop-filter:blur(12px);box-shadow:0 2px 8px rgba(0,0,0,.04),0 12px 32px rgba(0,0,0,.07);transition:background .3s;}
.page-title{width:100%;background:none;border:none;outline:none;font-family:'Manrope',sans-serif;font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-bottom:8px;display:block;padding:0;line-height:1.3;}
.page-title::placeholder{color:var(--muted2);font-weight:400;}
.page-body{width:100%;background:rgba(106,158,126,.03);border:1.5px solid rgba(106,158,126,.18);border-radius:12px;outline:none;font-family:'Manrope',sans-serif;font-size:15px;color:var(--text);line-height:1.88;resize:none;display:block;padding:14px 16px;min-height:200px;max-height:420px;overflow-y:auto;transition:border-color .25s,background .25s,box-shadow .25s;}
.page-body:focus{border-color:rgba(106,158,126,.5);background:rgba(106,158,126,.05);box-shadow:0 0 0 3px rgba(106,158,126,.08),0 2px 8px rgba(0,0,0,.04);}
.page-body::placeholder{color:var(--muted2);font-style:italic;}
.s-lbl{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);}
.gbox-inline{background:none;border:none;border-bottom:1px solid rgba(106,158,126,.2);padding:5px 2px;width:100%;color:var(--text);font-size:14px;resize:none;font-family:'Manrope',sans-serif;line-height:1.55;transition:border-color .2s;overflow:hidden;min-height:30px;outline:none;}
.gbox-inline:focus{border-bottom-color:rgba(106,158,126,.5);}
.gbox-inline::placeholder{color:var(--muted2);}

/* Read */
.read-page{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:20px 22px;backdrop-filter:blur(10px);transition:background .3s;}
.read-title{font-family:'Manrope',sans-serif;font-size:18px;font-weight:600;color:var(--text);letter-spacing:-.02em;margin-bottom:10px;line-height:1.3;}
.read-body{font-family:'Manrope',sans-serif;font-size:14.5px;color:var(--text2);line-height:1.8;white-space:pre-wrap;word-break:break-word;}
.read-edit-btn{background:none;border:1px solid var(--border2);border-radius:16px;padding:4px 12px;font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);cursor:pointer;transition:all .2s;}
.read-edit-btn:hover{border-color:rgba(122,170,140,.4);color:var(--accent);}
.done-page{background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:40px 22px;backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;gap:9px;text-align:center;}

/* Tasks */
.ainp{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:9px 13px;color:var(--text);font-size:14px;font-family:'Manrope',sans-serif;transition:border-color .2s;}
.ainp:focus{outline:none;border-color:rgba(122,170,140,.5);}
.ainp::placeholder{color:var(--muted);}
.addbtn{background:rgba(122,170,140,.13);border:1px solid rgba(122,170,140,.28);color:var(--accent);border-radius:10px;width:40px;font-size:20px;cursor:pointer;transition:all .2s;line-height:1;}
.addbtn:hover{background:rgba(122,170,140,.22);transform:scale(1.05);}
.trow{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;transition:all .2s;}
.trow:hover{border-color:var(--border2);}
.ttxt{flex:1;font-size:14px;color:var(--text);font-family:'Manrope',sans-serif;line-height:1.45;}
.mark-btn{background:none;border:none;cursor:pointer;font-size:17px;padding:1px 2px;line-height:1;border-radius:5px;transition:all .15s;flex-shrink:0;}
.mark-btn:hover{background:rgba(122,170,140,.1);transform:scale(1.15);}

/* Entry cards */
.ecard{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:9px;cursor:pointer;transition:all .22s;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.ecard:hover{border-color:rgba(106,158,126,.35);box-shadow:0 6px 20px rgba(0,0,0,.09);transform:translateY(-2px);}
.ecard:active{transform:translateY(0);box-shadow:0 1px 4px rgba(0,0,0,.04);}
.gchip{background:rgba(106,158,126,.1);border:1px solid rgba(106,158,126,.22);border-radius:7px;padding:3px 9px;font-size:12px;color:var(--accent);font-style:italic;}

/* Mood button bounce on select */
.mood-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;cursor:pointer;transition:all .2s;font-family:inherit;min-width:82px;justify-content:center;}
.mood-btn:active{transform:scale(.92);}
.mood-btn.selected{animation:bounce .35s ease;}

/* Skeleton loading */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);background-size:400px 100%;animation:skeletonShimmer 1.4s infinite;border-radius:8px;}

/* Future Self card highlight */
.manifest-hero{background:linear-gradient(135deg,rgba(245,240,255,.97),rgba(255,245,235,.97));border:1.5px solid rgba(212,149,106,.22)!important;box-shadow:0 4px 20px rgba(212,149,106,.1);}
.dark .manifest-hero{background:linear-gradient(135deg,rgba(40,35,55,.97),rgba(45,35,25,.97));}

/* Week cells */
.wcell{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);transition:all .2s;}
.wcell.clickable:hover{border-color:rgba(122,170,140,.22);cursor:pointer;}

/* Calendar */
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.calhd{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center;padding-bottom:5px;letter-spacing:.06em;}
.calday{aspect-ratio:1;border-radius:7px;background:var(--input-bg);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s;cursor:default;}
.calhas{background:rgba(122,170,140,.09)!important;border-color:rgba(122,170,140,.2)!important;cursor:pointer;}
.calhas:hover{transform:scale(1.07);}
.caltoday{border-color:var(--accent)!important;box-shadow:0 0 8px rgba(122,170,140,.22);}
.caln{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.calhas .caln{color:var(--accent);}

/* Manifest */
.man-inp{width:100%;background:rgba(212,149,106,.04);border:1px solid rgba(212,149,106,.15);border-radius:10px;padding:9px 13px;color:var(--text);font-size:14px;font-family:'Manrope',sans-serif;transition:border-color .2s;resize:none;overflow:hidden;min-height:38px;outline:none;}
.man-inp:focus{border-color:rgba(212,149,106,.4);}
.man-inp::placeholder{color:var(--muted);}
.man-row{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;transition:all .2s;}
.man-row.achieved{background:rgba(122,170,140,.06);border-color:rgba(122,170,140,.2);}
.man-txt{flex:1;font-size:14px;font-family:'Manrope',sans-serif;color:var(--text);line-height:1.5;}
.man-date{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}

/* Search */
.sinp{background:var(--bg4);border:1px solid var(--border2);border-radius:10px;padding:10px 13px;width:100%;color:var(--text);font-size:14px;font-family:'Manrope',sans-serif;margin-bottom:14px;transition:border-color .2s;}
.sinp:focus{outline:none;border-color:rgba(0,0,0,.2);}
.sinp::placeholder{color:var(--muted);}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(122,170,140,.3);border-top-color:#7aaa8c;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);line-height:2.1;font-size:14px;}
.ptitle{font-size:21px;font-weight:600;letter-spacing:-.02em;color:var(--text);}
.psub{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--muted);margin-top:3px;letter-spacing:.07em;}

/* Splash */
.splash{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.splash-body{position:relative;z-index:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;padding:0 28px;animation:fadeUp .9s ease both;}
.splash-glyph{font-size:48px;animation:sprout .8s ease both,seedglow 3s 1s ease-in-out infinite;display:block;margin-bottom:4px;}
.splash-title{font-family:'Manrope',sans-serif;font-size:42px;font-weight:300;letter-spacing:.1em;color:var(--text);}
.splash-meaning{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.splash-about{font-family:'Manrope',sans-serif;font-size:14px;line-height:1.9;color:var(--muted);max-width:280px;margin-top:4px;}
.splash-bar{width:110px;height:2px;background:var(--muted3);border-radius:2px;overflow:hidden;margin-top:10px;}
.splash-fill{height:100%;background:linear-gradient(90deg,#7aaa8c,#b08ac8,#d4956a);border-radius:2px;animation:load 3.2s ease forwards;}

@media(max-width:600px){.hdr{padding:10px 12px;}.nb{padding:4px 7px;font-size:9px;}.main{padding:14px 12px 80px;}.card{padding:12px 14px;}.auth-card{padding:28px 20px;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Supabase ──────────────────────────────────────────────────────────────────
const SUPA_URL = "https://ouylavxahevdhdzwxnto.supabase.co";
const SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91eWxhdnhhaGV2ZGhkend4bnRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTcyNDMsImV4cCI6MjA4OTQ5MzI0M30.V8z3LNwaSwLaB7hOsdgENJ8Caiuywotp6MUlkwbCWOs";
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

// ── Date helpers ──────────────────────────────────────────────────────────────
const fmtD=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${day}`;};
// Dynamic today — always uses current local time, never stale
const getToday=()=>fmtD(new Date());
const todayStr=getToday();
const shiftDate=(s,n)=>{const[y,m,d]=s.split("-").map(Number),nd=new Date(y,m-1,d+n);return fmtD(nd);};
const parseD=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const dayLabel=s=>{const today=getToday();if(s===today)return"Today";if(s===shiftDate(today,-1))return"Yesterday";return parseD(s).toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});};
const getWeekDates=off=>{const t=new Date(),day=t.getDay(),diff=(day===0?-6:1-day)+off*7,mon=new Date(t.getFullYear(),t.getMonth(),t.getDate()+diff);return Array.from({length:7},(_,i)=>shiftDate(fmtD(mon),i));};
const getMonthDates=off=>{const t=new Date(),s=new Date(t.getFullYear(),t.getMonth()+off,1),e=new Date(t.getFullYear(),t.getMonth()+off+1,0);const a=[];for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))a.push(fmtD(new Date(d)));return a;};

const MOODS=[
  {emoji:"🫂",label:"Heavy", bg:"rgba(140,160,200,.13)",ac:"#8ca0c8"},
  {emoji:"⛅",label:"Okay",  bg:"rgba(170,190,210,.13)",ac:"#aabece"},
  {emoji:"🌸",label:"Calm",  bg:"rgba(200,155,175,.13)",ac:"#c89aae"},
  {emoji:"☀️",label:"Good",  bg:"rgba(255,210,120,.13)",ac:"#e8c060"},
  {emoji:"🥂",label:"Joyful",bg:"rgba(160,220,180,.13)",ac:"#7aaa8c"},
];

function Blobs(){return<div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0,overflow:"hidden"}}><div className="blob blob1"/><div className="blob blob2"/><div className="blob blob3"/></div>;}

function Splash(){return<div className="splash"><Blobs/><div className="splash-body"><span className="splash-glyph">🌱</span><h1 className="splash-title">seeds</h1><p className="splash-meaning">a journal for what you're growing</p><p className="splash-about">Every thought you write,<br/>every thing you're grateful for,<br/>is a seed planted in your story.</p><div className="splash-bar"><div className="splash-fill"/></div></div></div>;}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({onAuth}){
  const[mode,setMode]=useState("login"); // login | signup | forgot
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[ok,setOk]=useState("");

  const submit=async()=>{
    setErr("");setOk("");
    if(!email.trim()||(!password.trim()&&mode!=="forgot")){setErr("Please fill in all fields.");return;}
    setLoading(true);
    try{
      if(mode==="login"){
        const{error}=await supa.auth.signInWithPassword({email:email.trim(),password});
        if(error)throw error;
      } else if(mode==="signup"){
        if(password.length<6){setErr("Password must be at least 6 characters.");setLoading(false);return;}
        const{error}=await supa.auth.signUp({email:email.trim(),password});
        if(error)throw error;
        setOk("Account created! You can now sign in.");
        setMode("login");setPassword("");
      } else if(mode==="forgot"){
        const{error}=await supa.auth.resetPasswordForEmail(email.trim());
        if(error)throw error;
        setOk("Password reset email sent! Check your inbox.");
        setMode("login");
      }
    }catch(e){
      setErr(e.message||"Something went wrong. Try again.");
    }
    setLoading(false);
  };

  return(
    <div className="auth-wrap"><Blobs/>
      <div className="auth-card">
        <div className="auth-logo">
          <span className="auth-glyph">🌱</span>
          <div className="auth-name">seeds</div>
          <div className="auth-tagline">your gentle journal</div>
        </div>
        <div className="auth-title">
          {mode==="login"?"Welcome back":mode==="signup"?"Create your account":"Reset password"}
        </div>
        {err&&<div className="auth-err">{err}</div>}
        {ok&&<div className="auth-ok">{ok}</div>}
        <input className="auth-inp" type="email" placeholder="Email address" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>
        {mode!=="forgot"&&<input className="auth-inp" type="password" placeholder="Password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()}/>}
        <button className="auth-btn" onClick={submit} disabled={loading}>
          {loading?<span className="spinner"/>:mode==="login"?"Sign in →":mode==="signup"?"Create account →":"Send reset email →"}
        </button>
        {mode==="login"&&(
          <div className="auth-switch">
            <div style={{marginBottom:6}}>Don't have an account? <span onClick={()=>{setMode("signup");setErr("");setOk("");}}>Sign up</span></div>
            <div><span onClick={()=>{setMode("forgot");setErr("");setOk("");}}>Forgot password?</span></div>
          </div>
        )}
        {mode==="signup"&&<div className="auth-switch">Already have an account? <span onClick={()=>{setMode("login");setErr("");setOk("");}}>Sign in</span></div>}
        {mode==="forgot"&&<div className="auth-switch"><span onClick={()=>{setMode("login");setErr("");setOk("");}}>Back to sign in</span></div>}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[screen,setScreen]=useState("splash");
  const[user,setUser]=useState(null);
  const[view,setView]=useState("today");
  const[entries,setEntries]=useState({});
  const[manifest,setManifest]=useState([]);
  const[selDate,setSelDate]=useState(getToday());
  const[wOff,setWOff]=useState(0);
  const[mOff,setMOff]=useState(0);
  const[searchQ,setSearchQ]=useState("");
  const[saving,setSaving]=useState(false);
  const[syncing,setSyncing]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    const t=setTimeout(()=>setScreen("auth"),3400);
    supa.auth.getSession().then(({data:{session}})=>{
      if(session){setUser(session.user);setScreen("app");}
    });
    const{data:{subscription}}=supa.auth.onAuthStateChange((_,session)=>{
      if(session){setUser(session.user);setScreen("app");}
      else{setUser(null);setScreen("auth");setEntries({});setManifest([]);}
    });
    return()=>{clearTimeout(t);subscription.unsubscribe();};
  },[]);

  // Load all data when user logs in
  useEffect(()=>{
    if(!user)return;
    loadAllData();
  },[user]);

  const loadAllData=async()=>{
    setSyncing(true);
    try{
      // Load entries
      const{data:eData}=await supa.from("entries").select("*").eq("user_id",user.id);
      if(eData){
        const map={};
        eData.forEach(row=>{
          map[row.date]={
            title:row.title||"",
            journal:row.journal||"",
            mood:row.mood,
            gratitudes:row.gratitudes||[],
            todos:row.todos||[],
            createdAt:row.created_at
          };
        });
        setEntries(map);
      }
      // Load manifest
      const{data:mData}=await supa.from("manifest").select("*").eq("user_id",user.id).order("created_at",{ascending:false});
      if(mData)setManifest(mData.map(r=>({id:r.id,text:r.text,date:r.date,achieved:r.achieved,achievedDate:r.achieved_date})));
    }catch(e){console.error("Load error:",e);}
    setSyncing(false);
  };

  const getE=d=>entries[d]||{title:"",journal:"",mood:null,gratitudes:["","",""],todos:[],createdAt:new Date().toISOString()};

  const upd=async(d,patch)=>{
    setEntries(prev=>({...prev,[d]:{...getE(d),...patch}}));
    setSaving(true);
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const entry={...getE(d),...patch};
      try{
        await supa.from("entries").upsert({
          user_id:user.id,
          date:d,
          title:entry.title||"",
          journal:entry.journal||"",
          mood:entry.mood,
          gratitudes:entry.gratitudes||[],
          todos:entry.todos||[],
          updated_at:new Date().toISOString()
        },{onConflict:"user_id,date"});
      }catch(e){console.error("Save error:",e);}
      setSaving(false);
    },800);
  };

  const addManifest=async(text)=>{
    const item={id:Date.now().toString(),text,date:getToday(),achieved:false,achievedDate:null};
    setManifest(prev=>[item,...prev]);
    await supa.from("manifest").insert({user_id:user.id,text,date:getToday(),achieved:false});
  };

  const toggleManifest=async(id)=>{
    const item=manifest.find(m=>m.id===id);
    if(!item)return;
    const achieved=!item.achieved;
    const achievedDate=achieved?getToday():null;
    setManifest(prev=>prev.map(m=>m.id===id?{...m,achieved,achievedDate}:m));
    await supa.from("manifest").update({achieved,achieved_date:achievedDate}).eq("id",id);
  };

  const deleteManifest=async(id)=>{
    setManifest(prev=>prev.filter(m=>m.id!==id));
    await supa.from("manifest").delete().eq("id",id);
  };

  const signOut=async()=>{await supa.auth.signOut();};

  const[dark,setDark]=useState(()=>{try{return localStorage.getItem("seeds_theme")==="dark";}catch{return false;}});

  const toggleTheme=()=>{
    const nd=!dark;
    setDark(nd);
    try{localStorage.setItem("seeds_theme",nd?"dark":"light");}catch{}
  };

  // Streak — counts consecutive days with entries
  // Doesn't reset at start of day if today has no entry yet
  const streak=()=>{
    let c=0;
    const today=getToday();
    const todayEntry=entries[today];
    const hasTodayEntry=!!(todayEntry&&(todayEntry.journal?.trim()||todayEntry.gratitudes?.some(Boolean)));
    const d=new Date();
    // If no entry today yet, start checking from yesterday so streak stays intact
    if(!hasTodayEntry) d.setDate(d.getDate()-1);
    while(true){
      const ds=fmtD(d);
      const e=entries[ds];
      if(!e||(!e.journal?.trim()&&!e.gratitudes?.some(Boolean)))break;
      c++;
      d.setDate(d.getDate()-1);
    }
    return c;
  };
  const streakCount=streak();
  // Smart greeting — changes based on time AND whether user journaled today
  const greeting=()=>{
    try{
      const h=new Date().getHours();
      const todayEntry=entries?.[getToday()];
      const hasJournaledToday=!!(todayEntry?.journal?.trim()||todayEntry?.gratitudes?.some(Boolean));

      if(hasJournaledToday){
        const affirmations=[
          "You showed up today 🌱",
          "Nice consistency ✨",
          "Entry saved. You're building something here.",
          "You're doing great 🌿",
          "Keep going — it adds up.",
          "Another day, another seed planted 🌱",
        ];
        const idx=(streakCount||0)%affirmations.length;
        return affirmations[idx];
      }

      if(h>=5&&h<12) return"Good morning 🌅";
      if(h>=12&&h<17) return"Good afternoon ☀️";
      if(h>=17&&h<21) return"Good evening 🌆";
      return"Late night thoughts hit different 🌙";
    }catch{
      return"Good morning 🌱";
    }
  };

  const[streakCelebrate,setStreakCelebrate]=useState(false);
  const prevStreakRef=useRef(0);

  // Detect streak increase and celebrate
  useEffect(()=>{
    if(streakCount>0&&streakCount>prevStreakRef.current&&prevStreakRef.current>0){
      setStreakCelebrate(true);
      setTimeout(()=>setStreakCelebrate(false),3000);
    }
    prevStreakRef.current=streakCount;
  },[streakCount]);

  const wDates=getWeekDates(wOff),mDates=getMonthDates(mOff);
  const wEnt=wDates.map(d=>({date:d,e:entries[d]})).filter(x=>x.e);
  const mEnt=mDates.map(d=>({date:d,e:entries[d]})).filter(x=>x.e);
  const searchRes=searchQ.length>1?Object.entries(entries).filter(([,e])=>e.title?.toLowerCase().includes(searchQ.toLowerCase())||e.journal?.toLowerCase().includes(searchQ.toLowerCase())||e.gratitudes?.some(g=>g?.toLowerCase().includes(searchQ.toLowerCase()))).sort(([a],[b])=>b.localeCompare(a)):[];

  // 🌱 Seed Growth System
  const seedGrowth=(count)=>{
    if(count>=30)return{icon:"🌳",label:"Tree",desc:"30+ days — you're rooted"};
    if(count>=7) return{icon:"🌿",label:"Plant",desc:"7+ days — growing strong"};
    if(count>=3) return{icon:"🌱",label:"Sprout",desc:"3+ days — sprouting"};
    return{icon:"🌰",label:"Seed",desc:"Just planted"};
  };
  const growth=seedGrowth(totalDays);

  if(screen==="splash")return<Splash/>;
  if(screen==="auth"||!user)return<AuthScreen onAuth={()=>setScreen("app")}/>;

  // Profile stats
  const totalEntries=Object.keys(entries).length;
  const totalDays=Object.keys(entries).filter(d=>entries[d].journal?.trim()||entries[d].gratitudes?.some(Boolean)).length;
  const moodCounts=MOODS.map((_,i)=>Object.values(entries).filter(e=>e.mood===i).length);
  const topMoodIdx=moodCounts.indexOf(Math.max(...moodCounts));
  const longestStreak=()=>{
    const dates=Object.keys(entries).filter(d=>entries[d].journal?.trim()||entries[d].gratitudes?.some(Boolean)).sort();
    let max=0,cur=0,prev=null;
    dates.forEach(d=>{
      if(prev&&shiftDate(prev,1)===d)cur++;
      else cur=1;
      if(cur>max)max=cur;
      prev=d;
    });
    return max;
  };

  // Random past entry
  const randomEntry=()=>{
    const keys=Object.keys(entries).filter(d=>entries[d].journal?.trim());
    if(!keys.length)return null;
    return keys[Math.floor(Math.random()*keys.length)];
  };

  // Writing prompts
  const PROMPTS=["What made you smile today?","What's one thing you're proud of this week?","What are you looking forward to?","Describe your mood in 3 words.","What's been on your mind lately?","What's something you want to remember about today?","What did you learn today?","Who made your day better?","What's one thing you'd do differently?","What are you grateful for right now?"];
  const randomPrompt=()=>PROMPTS[Math.floor(Math.random()*PROMPTS.length)];

  return(
    <div className={dark?"dark":""} style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"'Manrope',sans-serif",display:"flex",flexDirection:"column",position:"relative",transition:"background .3s,color .3s"}}>
      <Blobs/>
      <header className="hdr">
        <div className="logo" onClick={()=>setView("today")}>
          <span className="lmark">🌱</span><span className="lname">seeds</span>
          {saving&&<span className="stag">saving…</span>}
          {!saving&&syncing&&<span className="stag">syncing…</span>}
          {!saving&&!syncing&&<span className="stag">✓ saved</span>}
        </div>
        <nav className="nav">
          {[["today","Write"],["todos","Tasks"],["entries","Past"],["weekly","Week"],["monthly","Month"],["manifest","Future"],["search","Search"],["profile","Profile"]].map(([v,l])=>(
            <button key={v} className={`nb${view===v?" na":""}`} onClick={()=>setView(v)}>{l}</button>
          ))}
          <button className="theme-btn" onClick={toggleTheme} title={dark?"Switch to light mode":"Switch to dark mode"}>{dark?"☀️":"🌙"}</button>
          <button className="lock-btn" onClick={signOut}>Sign out</button>
        </nav>
      </header>
      <main className="main">
        {/* Skeleton loading while syncing first time */}
        {syncing&&Object.keys(entries).length===0?(
          <div style={{display:"flex",flexDirection:"column",gap:12,paddingTop:8}}>
            <div className="skeleton" style={{height:22,width:"60%",marginBottom:4}}/>
            <div className="skeleton" style={{height:14,width:"40%",marginBottom:16}}/>
            <div className="skeleton" style={{height:220,borderRadius:18}}/>
            <div className="skeleton" style={{height:80,borderRadius:14}}/>
            <div className="skeleton" style={{height:80,borderRadius:14}}/>
          </div>
        ):(
          <>
            {view==="today"   &&<WriteView   date={selDate} entry={getE(selDate)} upd={p=>upd(selDate,p)} setDate={setSelDate} greeting={greeting()} streak={streakCount} randomPrompt={randomPrompt} growth={growth}/>}
            {view==="todos"   &&<TodoView    date={selDate} entry={getE(selDate)} upd={p=>upd(selDate,p)}/>}
            {view==="entries" &&<EntriesView entries={entries} onPick={d=>{setSelDate(d);setView("today");}}/>}
            {view==="weekly"  &&<WeeklyView  wDates={wDates} wEnt={wEnt} entries={entries} wOff={wOff} setWOff={setWOff} onPick={d=>{setSelDate(d);setView("today");}}/>}
            {view==="monthly" &&<MonthlyView mDates={mDates} mEnt={mEnt} entries={entries} mOff={mOff} setMOff={setMOff} onPick={d=>{setSelDate(d);setView("today");}}/>}
            {view==="manifest"&&<ManifestView manifest={manifest} addManifest={addManifest} toggleManifest={toggleManifest} deleteManifest={deleteManifest}/>}
            {view==="search"  &&<SearchView  q={searchQ} setQ={setSearchQ} res={searchRes} onPick={d=>{setSelDate(d);setView("today");}}/>}
            {view==="profile" &&<ProfileView entries={entries} totalEntries={totalEntries} totalDays={totalDays} streakCount={streakCount} longestStreak={longestStreak()} topMood={totalEntries>0?MOODS[topMoodIdx]:null} randomEntry={randomEntry} onPick={d=>{setSelDate(d);setView("today");}} user={user} growth={growth}/>}
          </>
        )}
      </main>

      {/* Streak celebration toast */}
      {streakCelebrate&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"linear-gradient(135deg,#d4956a,#c47a55)",color:"#fff",borderRadius:24,padding:"12px 22px",fontFamily:"'Manrope',sans-serif",fontSize:13,fontWeight:600,boxShadow:"0 8px 32px rgba(212,149,106,.4)",zIndex:999,animation:"streakPop .4s ease both",display:"flex",alignItems:"center",gap:8,whiteSpace:"nowrap"}}>
          <span style={{fontSize:20}}>🔥</span>
          <span>{streakCount} day streak! You're showing up for yourself.</span>
        </div>
      )}
    </div>
  );
}

// ── Write View ────────────────────────────────────────────────────────────────
function WriteView({date,entry,upd,setDate,greeting,streak,randomPrompt,growth}){
  const isToday=date===getToday();
  const hasContent=!!(entry.title?.trim()||entry.journal?.trim());
  const[editing,setEditing]=useState(!hasContent);
  const[doneStyle,setDoneStyle]=useState(()=>{try{return localStorage.getItem("seeds_done_style")||"read";}catch{return"read";}});
  const[prompt,setPrompt]=useState("");
  const titleRef=useRef(null);

  useEffect(()=>{const has=!!(entry.title?.trim()||entry.journal?.trim());setEditing(!has);},[date]);
  useEffect(()=>{
    if(editing&&!entry.journal?.trim()){
      setTimeout(()=>document.getElementById("jbody")?.focus(),100);
    }
  },[editing,date]);

  const saveDoneStyle=s=>{setDoneStyle(s);try{localStorage.setItem("seeds_done_style",s);}catch{}};
  const moodObj=entry.mood!=null?MOODS[entry.mood]:null;
  const grats=(entry.gratitudes||[]).filter(Boolean);
  const wordCount=(entry.journal||"").trim().split(/\s+/).filter(Boolean).length;

  const DateNav=()=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <button className="arw" onClick={()=>setDate(shiftDate(date,-1))}>‹</button>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#c0c0c0",letterSpacing:".12em",textTransform:"uppercase"}}>{dayLabel(date)}</div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"var(--muted3)",marginTop:2}}>{date}{!isToday&&<span style={{color:"#7aaa8c"}}> · past</span>}</div>
      </div>
      <button className="arw" disabled={isToday} onClick={()=>{const n=shiftDate(date,1);if(n<=getToday())setDate(n);}}>›</button>
    </div>
  );

  if(editing)return(
    <div className="view">
      {isToday&&(
        <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid rgba(0,0,0,.05)"}}>
          <div style={{fontSize:17,fontWeight:600,color:"var(--text)",marginBottom:4}}>{greeting}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"var(--muted)"}}>{new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
            {streak>0&&<div style={{display:"flex",alignItems:"center",gap:3,background:"rgba(212,149,106,.1)",border:"1px solid rgba(212,149,106,.2)",borderRadius:18,padding:"2px 9px"}}><span style={{fontSize:11}}>🔥</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#d4956a"}}>{streak} day streak</span></div>}
          </div>
        </div>
      )}
      <DateNav/>
      {!isToday&&<div style={{background:"rgba(122,170,140,.07)",border:"1px solid rgba(122,170,140,.15)",borderRadius:8,padding:"6px 12px",marginBottom:10,fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c"}}>✎ Saving to {date}</div>}
      <div className="page">

        {/* ── STEP 1: Journal first — main action ── */}
        <div className="s-lbl" style={{marginBottom:8}}>Write</div>
        {/* Writing prompt */}
        {!entry.journal?.trim()&&(
          <div style={{marginBottom:8}}>
            {prompt?<p style={{fontSize:13,color:"var(--muted)",fontStyle:"italic",marginBottom:6,lineHeight:1.6}}>💭 {prompt}</p>:null}
            <button onClick={()=>setPrompt(randomPrompt())} style={{background:"none",border:"1px solid var(--border2)",borderRadius:16,padding:"3px 11px",fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(106,158,126,.4)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border2)"}>
              💭 {prompt?"new prompt":"writing prompt"}
            </button>
          </div>
        )}
        <textarea id="jbody" className="page-body" placeholder="Write freely… no one's reading but you 🌱"
          value={entry.journal||""}
          onChange={e=>upd({journal:e.target.value})}
        />
        {wordCount>0&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",textAlign:"right",marginTop:4}}>{wordCount} word{wordCount!==1?"s":""}</div>}

        {/* ── STEP 2: Title — name what you wrote ── */}
        <div style={{height:"1px",background:"var(--border)",margin:"18px 0 14px"}}/>
        <div className="s-lbl" style={{marginBottom:6}}>Give this day a name</div>
        <input ref={titleRef} className="page-title"
          placeholder="Title (optional)"
          value={entry.title||""} onChange={e=>upd({title:e.target.value})}
          onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();}}}
          style={{fontSize:17,marginBottom:0}}
        />

        {/* ── STEP 3: Mood & Gratitude ── */}
        <div style={{height:"1px",background:"var(--border)",margin:"18px 0 16px"}}/>
        <div style={{marginBottom:18}}>
          <div className="s-lbl">How are you feeling?</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:11}}>
            {MOODS.map((m,i)=>(
              <button key={i}
                className={`mood-btn${entry.mood===i?" selected":""}`}
                onClick={()=>upd({mood:entry.mood===i?null:i})}
                style={{border:`1.5px solid ${entry.mood===i?m.ac:"var(--border2)"}`,background:entry.mood===i?m.bg:"var(--bg2)",boxShadow:entry.mood===i?`0 2px 12px ${m.ac}30`:"none"}}>
                <span style={{fontSize:18}}>{m.emoji}</span>

      </div>
    </div>
  );

  return(
    <div className="view">
      {/* Greeting always visible on today's tab */}
      {isToday&&(
        <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid var(--border)"}}>

        {[["read","📖"],["done","✅"],["blank","○"]].map(([s,icon])=>(
          <button key={s} onClick={()=>saveDoneStyle(s)} style={{background:doneStyle===s?"rgba(122,170,140,.12)":"none",border:`1px solid ${doneStyle===s?"rgba(122,170,140,.35)":"var(--border2)"}`,borderRadius:16,padding:"2px 8px",fontFamily:"'DM Mono',monospace",fontSize:9.5,color:doneStyle===s?"#7aaa8c":"var(--muted)",cursor:"pointer",transition:"all .2s"}}>{icon}</button>

          {entry.title?.trim()&&<div className="read-title">{entry.title}</div>}

          {moodObj&&<div style={{display:"flex",alignItems:"center",gap:7,marginBottom:grats.length>0?12:0}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"var(--muted2)",letterSpacing:".12em",textTransform:"uppercase"}}>Feeling</span><span style={{display:"flex",alignItems:"center",gap:4,background:moodObj.bg,border:`1px solid ${moodObj.ac}`,borderRadius:16,padding:"2px 10px"}}><span style={{fontSize:13}}>{moodObj.emoji}</span><span style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:moodObj.ac,letterSpacing:".04em"}}>{moodObj.label}</span></span></div>}

// ── Todo View ─────────────────────────────────────────────────────────────────
function TodoView({date,entry,upd}){
  const[text,setText]=useState("");
  const ref=useRef(null);
  const todos=entry.todos||[];
  const add=()=>{const t=text.trim();if(!t)return;upd({todos:[...todos,{id:Date.now(),text:t,status:null}]});setText("");ref.current?.focus();};
  const setStatus=(id,s)=>upd({todos:todos.map(t=>t.id===id?{...t,status:t.status===s?null:s}:t)});
  const remove=id=>upd({todos:todos.filter(t=>t.id!==id)});
  const pending=todos.filter(t=>!t.status),done_=todos.filter(t=>t.status==="done"),fail_=todos.filter(t=>t.status==="fail");
  const TRow=({t})=>(
    <div className="trow" style={{opacity:t.status?.6:1}}>
      <span className="ttxt" style={{textDecoration:t.status?"line-through":"none",color:t.status?"#aaa":"#2a2a2a"}}>{t.text}</span>
      <button className={`mark-btn${t.status==="done"?" active-done":""}`} onClick={()=>setStatus(t.id,"done")}>✅</button>
      <button className={`mark-btn${t.status==="fail"?" active-fail":""}`} onClick={()=>setStatus(t.id,"fail")}>❌</button>
      <button style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--muted3)",padding:"0 2px",lineHeight:1,transition:"color .2s"}} onClick={()=>remove(t.id)} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
    </div>
  );
  return(
    <div className="view">
      <div style={{marginBottom:14}}>
        <div className="ptitle">Tasks</div>
        <div className="psub">{dayLabel(date)}</div>
        {todos.length>0&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"var(--muted)",marginTop:4,display:"flex",gap:10}}>
          <span style={{color:"#7aaa8c"}}>✅ {done_.length}</span>
          <span style={{color:"#e08080"}}>❌ {fail_.length}</span>
          {pending.length>0&&<span style={{color:"var(--muted)"}}>◯ {pending.length}</span>}
        </div>}
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14}}>
        <input ref={ref} className="ainp" placeholder="Add a task…" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
        <button className="addbtn" onClick={add}>＋</button>
      </div>
      {pending.length>0&&<div style={{marginBottom:12}}><div className="clbl">Pending</div>{pending.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {done_.length>0&&<div style={{marginBottom:12}}><div className="clbl">Completed ✅</div>{done_.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {fail_.length>0&&<div><div className="clbl">Didn't complete ❌</div>{fail_.map(t=><TRow key={t.id} t={t}/>)}</div>}
      {todos.length===0&&<div className="empty"><div style={{fontSize:30,marginBottom:8}}>🌿</div><p style={{fontWeight:500,color:"var(--text2)",marginBottom:4}}>Nothing here yet</p><p style={{fontSize:13}}>Add a task and start tracking your day</p></div>}
    </div>
  );
}

        <div className="clbl" style={{color:"#d4956a"}}>🌠 Plant a seed for the future</div>
        <div style={{display:"flex",gap:7}}>
          <textarea ref={ref} className="man-inp" rows={2} placeholder="What do you want to become, achieve, or experience?…" value={text} onChange={e=>setText(e.target.value)}/>
          <button onClick={add} style={{background:"linear-gradient(135deg,#d4956a,#c07850)",border:"none",color:"#fff",borderRadius:12,width:42,fontSize:20,cursor:"pointer",transition:"all .2s",lineHeight:1,flexShrink:0,boxShadow:"0 4px 12px rgba(212,149,106,.35)"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.06)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>＋</button>
        </div>
      </div>
      {manifest.length===0&&<div className="empty"><div style={{fontSize:32,marginBottom:8}}>🌠</div><p style={{fontWeight:500,color:"var(--text2)",marginBottom:4}}>Plant your first seed</p><p style={{fontSize:13}}>What do you want to become?<br/>Write it here and watch it grow.</p></div>}
      {pending.length>0&&<div style={{marginBottom:14}}><div className="clbl">Growing 🌱</div>
        {pending.map(m=><div key={m.id} className="man-row"><div style={{flex:1}}><div className="man-txt">{m.text}</div><div className="man-date">Planted {parseD(m.date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</div></div>
          <button onClick={()=>toggleManifest(m.id)} style={{background:"none",border:"1px solid rgba(122,170,140,.25)",borderRadius:16,padding:"3px 9px",fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"#7aaa8c",cursor:"pointer",transition:"all .2s",marginLeft:5,flexShrink:0}} onMouseEnter={e=>e.currentTarget.style.background="rgba(122,170,140,.1)"} onMouseLeave={e=>e.currentTarget.style.background="none"}>achieved ✓</button>
          <button onClick={()=>deleteManifest(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--muted3)",padding:"0 3px",transition:"color .2s",marginLeft:2}} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
        </div>)}
      </div>}
      {achieved.length>0&&<div><div className="clbl">Manifested ✨</div>
        {achieved.map(m=><div key={m.id} className="man-row achieved"><div style={{flex:1}}><div className="man-txt" style={{color:"#7aaa8c"}}>{m.text}</div><div style={{display:"flex",gap:6,marginTop:2,alignItems:"center",flexWrap:"wrap"}}><span style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,background:"rgba(122,170,140,.12)",color:"#7aaa8c",borderRadius:8,padding:"1px 6px"}}>✨ achieved</span>{m.achievedDate&&<span className="man-date">{parseD(m.achievedDate).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>}</div></div>
          <button onClick={()=>toggleManifest(m.id)} style={{background:"none",border:"none",fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"var(--muted)",cursor:"pointer",padding:"0 5px"}} title="Mark as not yet achieved">undo</button>
          <button onClick={()=>deleteManifest(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"var(--muted3)",padding:"0 3px",transition:"color .2s"}} onMouseEnter={e=>e.target.style.color="#d4956a"} onMouseLeave={e=>e.target.style.color="#ddd"}>×</button>
        </div>)}
      </div>}
    </div>
  );
}

// ── Profile View ──────────────────────────────────────────────────────────────
function ProfileView({entries,totalEntries,totalDays,streakCount,longestStreak,topMood,randomEntry,onPick,user,growth}){
  const[randomD,setRandomD]=useState(null);
  const re=entries[randomD];

  const showRandom=()=>{
    const d=randomEntry();
    if(d)setRandomD(d);
  };

  const statCard=(icon,label,value,sub)=>(
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:13,padding:"14px 16px",flex:1,minWidth:130}}>
      <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
      <div style={{fontSize:22,fontWeight:700,color:"var(--text)",letterSpacing:"-.02em"}}>{value}</div>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)",marginTop:2,letterSpacing:".05em"}}>{label}</div>
      {sub&&<div style={{fontFamily:"'DM Mono',monospace",fontSize:8.5,color:"var(--accent)",marginTop:2}}>{sub}</div>}
    </div>
  );

  return(
    <div className="view">
      <div style={{marginBottom:18}}>
        <div className="ptitle">Your Garden 🌱</div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"var(--muted)",marginTop:3}}>{user?.email}</div>
      </div>

      {/* Seed Growth */}
      {growth&&(
        <div className="card" style={{marginBottom:10,background:"linear-gradient(135deg,rgba(106,158,126,.08),rgba(106,158,126,.04))",border:"1px solid rgba(106,158,126,.18)"}}>
          <div className="clbl" style={{color:"var(--accent)"}}>Your growth stage</div>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:42,animation:"sprout .6s ease both"}}>{growth.icon}</div>
            <div>
              <div style={{fontSize:18,fontWeight:700,color:"var(--text)",marginBottom:2}}>{growth.label}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:"var(--muted)",marginBottom:6}}>{growth.desc}</div>
              {/* Growth progress bar */}
              <div style={{display:"flex",gap:4}}>
                {[{icon:"🌰",n:1},{icon:"🌱",n:3},{icon:"🌿",n:7},{icon:"🌳",n:30}].map((s,i)=>(
                  <div key={i} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <span style={{fontSize:14,opacity:totalDays>=s.n?1:.3}}>{s.icon}</span>
                    <div style={{width:28,height:3,borderRadius:2,background:totalDays>=s.n?"var(--accent)":"var(--border2)"}}/>
                    <span style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:totalDays>=s.n?"var(--accent)":"var(--muted)"}}>{s.n}d</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Stats */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {statCard("📝","total entries",totalEntries)}
        {statCard("📅","days journaled",totalDays)}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        {statCard("🔥","current streak",streakCount>0?`${streakCount}d`:"—",streakCount>0?"keep going!":"")}
        {statCard("🏆","longest streak",longestStreak>0?`${longestStreak}d`:"—")}
      </div>
      {topMood&&(
        <div className="card" style={{marginBottom:10}}>
          <div className="clbl">Most common mood</div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:28}}>{topMood.emoji}</span>
            <div>
              <div style={{fontSize:16,fontWeight:500,color:"var(--text)"}}>{topMood.label}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"var(--muted)"}}>your most logged feeling</div>
            </div>
          </div>
        </div>
      )}

      {/* Random past entry */}
      <div className="card" style={{marginBottom:10}}>
        <div className="clbl">✨ Surprise me</div>
        <p style={{fontSize:13,color:"var(--muted)",marginBottom:10,lineHeight:1.6}}>Take a trip back to a random past entry.</p>
        <button onClick={showRandom} style={{background:"rgba(122,170,140,.1)",border:"1px solid rgba(122,170,140,.25)",borderRadius:18,padding:"6px 16px",fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.background="rgba(122,170,140,.18)"} onMouseLeave={e=>e.currentTarget.style.background="rgba(122,170,140,.1)"}>
          🎲 show me a past entry
        </button>
        {randomD&&re&&(
          <div onClick={()=>onPick(randomD)} style={{marginTop:12,padding:"11px 13px",background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,cursor:"pointer",transition:"all .2s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="rgba(122,170,140,.3)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:"#7aaa8c",marginBottom:4}}>{dayLabel(randomD)} · {randomD}</div>
            {re.title?.trim()&&<div style={{fontSize:13,fontWeight:500,color:"var(--text)",marginBottom:3}}>{re.title}</div>}
            {re.journal?.trim()&&<p style={{fontSize:12,color:"var(--muted)",fontStyle:"italic",lineHeight:1.6,margin:0}}>{re.journal.slice(0,120)}…</p>}
          </div>
        )}
      </div>

    </div>
  );
}

// ── Search ────────────────────────────────────────────────────────────────────
function SearchView({q,setQ,res,onPick}){
  return(
    <div className="view">
      <div style={{marginBottom:12}}><div className="ptitle">Search</div><div className="psub">Look back through your days</div></div>
      <input className="sinp" placeholder="Search entries and gratitudes…" value={q} onChange={e=>setQ(e.target.value)}/>
      {q.length>1&&res.length===0&&<div className="empty"><p>Nothing found for "{q}"</p></div>}
      {res.map(([d,e])=>(
        <div key={d} className="ecard" onClick={()=>onPick(d)}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:e.title?.trim()?3:7}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:9.5,color:"#7aaa8c",letterSpacing:".06em"}}>{dayLabel(d)}</span>
            {e.mood!=null&&<span style={{fontSize:13}}>{MOODS[e.mood].emoji}</span>}
          </div>
          {e.title?.trim()&&<div style={{fontSize:14,fontWeight:500,color:"var(--text)",marginBottom:3}}>{e.title}</div>}
          {e.journal?.trim()&&<p style={{color:"var(--text3)",fontSize:13,lineHeight:1.65,fontStyle:"italic",marginBottom:5}}>{e.journal.slice(0,120)}…</p>}
          {e.gratitudes?.filter(Boolean).map((g,i)=><div key={i} style={{color:"#7aaa8c",fontSize:12,fontStyle:"italic",marginTop:2}}>✦ {g}</div>)}
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
